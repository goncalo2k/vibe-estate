name = "property-agg-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[triggers]
crons = ["0 */2 * * *", "0 */6 * * *", "0 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "property-agg-db"
database_id = "local"

[vars]
NOTIFICATION_EMAIL_FROM = "alerts@yourdomain.com"

# Secrets (set via `wrangler secret put`):
# IDEALISTA_API_KEY
# IDEALISTA_API_SECRET
# ANTHROPIC_API_KEY
